<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Charie 💜</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#5b247a,#1b0d2e);
color:white;
text-align:center;
overflow-x:hidden;
}


.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
}


h1{
font-size:55px;
animation:pop 1s;
}


.subtitle{
font-size:22px;
margin:20px;
}


button{
padding:18px 40px;
border:none;
border-radius:50px;
background:#ff4fa3;
color:white;
font-size:20px;
cursor:pointer;
box-shadow:0 0 25px #ff4fa3;
}


button:hover{
transform:scale(1.1);
}


/* Gift */

.gift{
font-size:100px;
cursor:pointer;
animation:bounce 1.5s infinite;
}


@keyframes bounce{
50%{transform:translateY(-20px);}
}


/* Letter */

#letter{
display:none;
padding:40px 20px;
animation:fade 2s;
}


.card{
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
padding:35px;
border-radius:25px;
max-width:900px;
margin:auto;
line-height:2;
}


#typing{
white-space:pre-line;
font-size:18px;
}


/* Gallery */

.gallery{
margin-top:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}


.gallery img{
width:100%;
height:300px;
object-fit:cover;
border-radius:20px;
transition:.4s;
}


.gallery img:hover{
transform:scale(1.05);
}


/* Hearts */

.heart{
position:fixed;
bottom:-50px;
animation:float 8s linear infinite;
font-size:30px;
}


@keyframes float{
to{
transform:translateY(-120vh);
opacity:0;
}
}


/* Balloons */

.balloon{
position:fixed;
bottom:-100px;
font-size:60px;
animation:balloon 10s linear infinite;
}


@keyframes balloon{
to{
transform:translateY(-120vh);
}
}


/* Confetti */

.confetti{
position:fixed;
width:10px;
height:10px;
animation:fall 3s linear;
}


@keyframes fall{
to{
transform:translateY(100vh);
}
}


@keyframes pop{
from{
transform:scale(.5);
opacity:0;
}
}


@keyframes fade{
from{opacity:0;}
}

</style>

</head>


<body>


<div class="hero" id="home">

<h1>
🎉 Happy Birthday<br>
Chasumi Nuhu 💜
</h1>

<p class="subtitle">
A special surprise made with love ❤️
</p>


<div class="gift" onclick="openGift()">
🎁
</div>

<p>
Tap the gift 🎁
</p>

<br>

<button onclick="playMusic()">
🎵 Play Music
</button>

</div>



<div id="letter">


<div class="card">

<h2>
💜 My Dear Charie 💜
</h2>


<p id="typing"></p>



<div class="gallery">

<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
<img src="photo4.jpg">
<img src="photo5.jpg">

</div>


<br>

<h3>
❤️ Forever grateful our paths crossed ❤️
</h3>

<br>

<p>
— Christopher
</p>


</div>

</div>



<audio id="music">
<source src="music.mp3" type="audio/mp3">
</audio>



<script>


const message=`Happy Birthday to my favorite person. ❤️

I honestly don't know where to start because you've become such an important part of my life.

Ever since we first met at church, and all the moments we shared at Autis' house, you've always been a source of joy to me.

You've been there through so many moments, making me laugh, encouraging me, and being your amazing self.

I pray God continues to favor you in every area of your life.

May your light keep shining brighter every single day.

Thank you for being you.

Happy Birthday once again, my cute but senseless best friend 😂❤️

I love you so much.`;



function openGift(){

document.getElementById("home").style.display="none";

document.getElementById("letter").style.display="block";


confetti();


let i=0;

function type(){

if(i<message.length){

document.getElementById("typing").innerHTML+=message.charAt(i);

i++;

setTimeout(type,35);

}

}

type();

}



function playMusic(){

document.getElementById("music").play();

}



setInterval(()=>{

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="💜";

heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),8000);

},400);



setInterval(()=>{

let balloon=document.createElement("div");

balloon.className="balloon";

balloon.innerHTML="🎈";

balloon.style.left=Math.random()*100+"vw";

document.body.appendChild(balloon);

setTimeout(()=>balloon.remove(),10000);

},1200);



function confetti(){

for(let i=0;i<100;i++){

let c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"vw";

c.style.top="-20px";

c.style.background="white";

document.body.appendChild(c);


setTimeout(()=>c.remove(),3000);

}

}


</script>


</body>
</html>
