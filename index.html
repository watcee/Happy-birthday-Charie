<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Charie 💜</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#5b247a,#1b0d2e);
overflow-x:hidden;
color:white;
text-align:center;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
}

h1{
font-size:55px;
margin-bottom:20px;
animation:pop 1s ease;
}

.subtitle{
font-size:22px;
margin-bottom:40px;
opacity:.9;
}

button{
padding:18px 45px;
font-size:20px;
border:none;
border-radius:50px;
background:#ff4fa3;
color:white;
cursor:pointer;
box-shadow:0 0 30px rgba(255,79,163,.5);
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

#letter{
display:none;
max-width:900px;
margin:auto;
padding:60px 25px;
animation:fade 2s;
}

.card{
background:rgba(255,255,255,.1);
backdrop-filter:blur(15px);
padding:40px;
border-radius:25px;
line-height:2;
font-size:19px;
}

.gallery{
margin-top:60px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.gallery img{
width:100%;
height:350px;
object-fit:cover;
border-radius:20px;
box-shadow:0 0 25px rgba(255,255,255,.3);
transition:.4s;
}

.gallery img:hover{
transform:scale(1.05);
}

footer{
margin:80px 0 40px;
font-size:20px;
}

@keyframes pop{
from{transform:scale(.5);opacity:0;}
to{transform:scale(1);opacity:1;}
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

.heart{
position:fixed;
font-size:25px;
animation:float 8s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
100%{
transform:translateY(-120vh);
opacity:1;
}
}

</style>

</head>

<body>

<div class="hero">

<h1>🎉 Happy Birthday<br>Chasumi Nuhu 💜</h1>

<p class="subtitle">
A little surprise made with lots of love ❤️
</p>

<button onclick="openLetter()">
Open Your Gift 🎁
</button>

</div>

<div id="letter">

<div class="card">

<h2>💜 My Dear Charie 💜</h2>

<br>

<p id="typing"></p>

<div class="gallery">

<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
<img src="photo4.jpg">
<img src="photo5.jpg">

</div>

<footer>

❤️ Forever grateful our paths crossed. ❤️

<br><br>

— Christopher

</footer>

</div>

</div>

<script>

const message=`Happy Birthday to my favorite person. ❤️

I honestly don't know where to start because you've become such an important part of my life.

Ever since we first met at church, and all the moments we shared at Autis' house, you've always been a source of joy to me. Looking back now, I'm just grateful that fate brought us together because you're one of the best souls I've met in years.

You've been there through so many moments, making me laugh, encouraging me without even realizing it, and just being your amazing self. You mean so much to me, and I love you more than words can explain.

I pray God continues to favor you in every area of your life. May your light keep shining brighter every single day, and may you never lose the beautiful heart you have for God. Keep loving Him the way you always have, because it's one of the things I admire most about you.

I may not have said this before, but you're actually my mentor in so many ways. I've learned a lot from you, and I genuinely love everything about you.

Thank you for being you. Keep smiling, keep growing, and never change.

Happy Birthday once again, my cute but senseless best friend. 😂❤️ I love you so much, and I pray this new year brings you nothing but happiness, peace, and countless reasons to smile.`;

function openLetter(){

document.querySelector(".hero").style.display="none";

document.getElementById("letter").style.display="block";

let i=0;

function type(){

if(i<message.length){

document.getElementById("typing").innerHTML+=message.charAt(i);

i++;

setTimeout(type,25);

}

}

type();

}

setInterval(()=>{

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="💜";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(20+Math.random()*30)+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),8000);

},300);

</script>

</body>
</html>
